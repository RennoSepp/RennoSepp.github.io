<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RÜFÜS DU SOL Countdown</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
  height:100vh;
  overflow:hidden;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  background:#050510;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
}

.background{
  position:absolute;
  inset:0;
  background:
    radial-gradient(circle at 20% 20%, #ff0080 0%, transparent 28%),
    radial-gradient(circle at 80% 30%, #00d4ff 0%, transparent 28%),
    radial-gradient(circle at 50% 85%, #7c3aed 0%, transparent 32%);
  filter:blur(120px);
  animation:moveBg 12s infinite alternate ease-in-out;
}

@keyframes moveBg{
  from{transform:scale(1)}
  to{transform:scale(1.3) rotate(10deg)}
}

.container{
  position:relative;
  z-index:2;
  text-align:center;
  padding:20px;
}

.artist{
  font-size:clamp(3rem,10vw,8rem);
  font-weight:900;
  letter-spacing:6px;
  text-shadow:0 0 30px #00d4ff,0 0 70px #ff0080;
}

.subtitle{
  letter-spacing:5px;
  text-transform:uppercase;
  color:#ddd;
  margin:20px 0 40px;
}

.countdown{
  display:flex;
  justify-content:center;
  flex-wrap:wrap;
  gap:20px;
}

.box{
  min-width:130px;
  padding:25px;
  border-radius:24px;
  background:rgba(255,255,255,.08);
  border:1px solid rgba(255,255,255,.18);
  backdrop-filter:blur(20px);
  box-shadow:0 0 35px rgba(255,255,255,.12);
  animation:float 3s infinite ease-in-out;
}

.box:nth-child(2){animation-delay:.2s}
.box:nth-child(3){animation-delay:.4s}
.box:nth-child(4){animation-delay:.6s}

@keyframes float{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(-8px)}
}

.number{
  font-size:4rem;
  font-weight:900;
}

.label{
  margin-top:8px;
  letter-spacing:3px;
  font-size:.75rem;
  opacity:.8;
}

button{
  margin-top:28px;
  padding:16px 30px;
  border:none;
  border-radius:999px;
  cursor:pointer;
  background:white;
  color:black;
  font-weight:900;
  letter-spacing:2px;
  transition:.3s;
  box-shadow:0 0 30px rgba(255,255,255,.4);
}

button:hover{
  transform:scale(1.08);
}

.vibe-text{
  margin-top:20px;
  letter-spacing:6px;
  color:#ddd;
}

.location{
  margin-top:30px;
  font-size:.75rem;
  letter-spacing:6px;
  opacity:.55;
}

.launch{
  font-size:5rem;
  font-weight:900;
  animation:glow 1s infinite alternate;
}

@keyframes glow{
  from{text-shadow:0 0 20px #fff}
  to{text-shadow:0 0 40px #fff,0 0 80px #00d4ff,0 0 120px #ff0080}
}
</style>
</head>

<body>

<div class="background"></div>

<audio id="music" loop>
  <source src="rufus.mp3" type="audio/mpeg">
</audio>

<div class="container">

  <div class="artist">RÜFÜS DU SOL</div>
  <div class="subtitle">COUNTDOWN TO JUNE 6 • 12:00 AM</div>

  <div class="countdown">
    <div class="box">
      <div class="number" id="days">0</div>
      <div class="label">DAYS</div>
    </div>

    <div class="box">
      <div class="number" id="hours">0</div>
      <div class="label">HOURS</div>
    </div>

    <div class="box">
      <div class="number" id="minutes">0</div>
      <div class="label">MINUTES</div>
    </div>

    <div class="box">
      <div class="number" id="seconds">0</div>
      <div class="label">SECONDS</div>
    </div>
  </div>

  <button onclick="startExperience()">🌌 ENTER THE EXPERIENCE 🌌</button>
  <br>
  <button onclick="changeVibe()">✨ CHANGE THE VIBE ✨</button>

  <div class="vibe-text" id="vibeText">MIDNIGHT MODE</div>
  <div class="location">VANCOUVER • BC • UNDER THE STARS</div>

</div>

<script>
const targetDate = new Date("2026-06-06T00:00:00-07:00");

function updateCountdown(){
  const now = new Date();
  const diff = targetDate - now;

  if(diff <= 0){
    document.querySelector(".container").innerHTML =
      '<div class="launch">🌌 RÜFÜS TIME 🌌</div>';
    return;
  }

  document.getElementById("days").innerText =
    Math.floor(diff/(1000*60*60*24));

  document.getElementById("hours").innerText =
    String(Math.floor((diff/(1000*60*60))%24)).padStart(2,'0');

  document.getElementById("minutes").innerText =
    String(Math.floor((diff/(1000*60))%60)).padStart(2,'0');

  document.getElementById("seconds").innerText =
    String(Math.floor((diff/1000)%60)).padStart(2,'0');
}

function startExperience(){
  const music = document.getElementById("music");
  music.volume = 0.55;
  music.play();

  document.getElementById("vibeText").innerText = "MUSIC ON";
}

function changeVibe(){
  const colorSets = [
    ["#ff0080","#00d4ff","#7c3aed"],
    ["#ff7a18","#ff2d55","#ffd166"],
    ["#00ff88","#00c2ff","#0047ff"],
    ["#ff4d4d","#ffcc00","#ff6b00"],
    ["#00fff0","#7dff00","#00a2ff"],
    ["#ff00ff","#00ffff","#ffffff"],
    ["#ff3cac","#784ba0","#2b86c5"],
    ["#ff9a00","#ff0058","#6a00ff"],
    ["#00ff95","#00e5ff","#ffea00"],
    ["#ffffff","#7c3aed","#00d4ff"]
  ];

  const vibeNames = [
    "INNERBLOOM",
    "SUNDREAM",
    "ATLAS",
    "DESERT NIGHT",
    "NEON OCEAN",
    "AFTERGLOW",
    "SOLARA",
    "COSMIC",
    "AURORA",
    "MIDNIGHT DRIVE"
  ];

  const randomIndex = Math.floor(Math.random() * colorSets.length);
  const colors = colorSets[randomIndex];

  document.querySelector(".background").style.background = `
    radial-gradient(circle at 20% 20%, ${colors[0]} 0%, transparent 28%),
    radial-gradient(circle at 80% 30%, ${colors[1]} 0%, transparent 28%),
    radial-gradient(circle at 50% 85%, ${colors[2]} 0%, transparent 32%)
  `;

  document.getElementById("vibeText").innerText = vibeNames[randomIndex];

  document.querySelector(".artist").style.textShadow = `
    0 0 20px ${colors[0]},
    0 0 50px ${colors[1]},
    0 0 90px ${colors[2]}
  `;
}

updateCountdown();
setInterval(updateCountdown,1000);
</script>

</body>
</html>
